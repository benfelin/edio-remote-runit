<svg width="340" viewBox="0 0 340 980" role="img" xmlns="http://www.w3.org/2000/svg">
<title>eDio USB Remote — verified button code map</title>
<desc>Schematic of the ASUS eDio remote showing verified button codes. Filled = mapped, dashed = unmapped.</desc>

<style>
  text { font-family: sans-serif; fill: #222; }
  .code { font-size: 11px; font-weight: 600; }
  .label { font-size: 9px; fill: #555; }
  .label2 { font-size: 8px; fill: #888; }
  .title { font-size: 9px; fill: #999; }
  .mapped { fill: #e1f5ee; stroke: #0f6e56; stroke-width: 1; }
  .dwm { fill: #eeedfe; stroke: #534ab7; stroke-width: 1; }
  .unmapped { fill: none; stroke: #aaa; stroke-width: 1; stroke-dasharray: 3 3; }
  .mouse { fill: #f5f5f5; stroke: #555; stroke-width: 1; }
  .body { fill: #2a2a2a; stroke: #111; stroke-width: 1.5; }
  .trackball { fill: #555; stroke: #333; stroke-width: 1.5; }
  .tb-inner { fill: #777; }
  .section { font-size: 8px; fill: #aaa; }
</style>

<!-- Remote body -->
<rect x="30" y="10" width="280" height="950" rx="60" class="body"/>

<!-- SECTION: row 1 -->
<text x="24" y="62" class="section" text-anchor="end">row 1</text>
<circle cx="75" cy="60" r="18" class="unmapped"/>
<text x="75" y="57" class="code" text-anchor="middle" dominant-baseline="central">1</text>
<text x="75" y="87" class="label" text-anchor="middle">VCR</text>

<circle cx="128" cy="60" r="18" class="unmapped"/>
<text x="128" y="57" class="code" text-anchor="middle" dominant-baseline="central">2</text>
<text x="128" y="87" class="label" text-anchor="middle">DVD</text>

<circle cx="202" cy="60" r="18" class="unmapped"/>
<text x="202" y="57" class="code" text-anchor="middle" dominant-baseline="central">35</text>
<text x="202" y="87" class="label" text-anchor="middle">Teletext</text>

<circle cx="255" cy="60" r="18" class="unmapped"/>
<text x="255" y="57" class="code" text-anchor="middle" dominant-baseline="central">4</text>
<text x="255" y="87" class="label" text-anchor="middle">FM</text>

<!-- SECTION: row 2 (dual labels) -->
<text x="24" y="120" class="section" text-anchor="end">row 2</text>
<text x="75" y="108" class="label2" text-anchor="middle">Menu</text>
<circle cx="75" cy="122" r="13" class="unmapped"/>
<text x="75" y="119" class="code" text-anchor="middle" dominant-baseline="central">5</text>
<text x="75" y="143" class="label2" text-anchor="middle">Inst.Replay</text>

<text x="128" y="108" class="label2" text-anchor="middle">Subtitles</text>
<circle cx="128" cy="122" r="13" class="unmapped"/>
<text x="128" y="119" class="code" text-anchor="middle" dominant-baseline="central">6</text>
<text x="128" y="143" class="label2" text-anchor="middle">Playback</text>

<text x="202" y="108" class="label2" text-anchor="middle">Audio</text>
<circle cx="202" cy="122" r="13" class="unmapped"/>
<text x="202" y="119" class="code" text-anchor="middle" dominant-baseline="central">7</text>
<text x="202" y="143" class="label2" text-anchor="middle">EPG</text>

<text x="255" y="108" class="label2" text-anchor="middle">Snapshot</text>
<circle cx="255" cy="122" r="13" class="unmapped"/>
<text x="255" y="119" class="code" text-anchor="middle" dominant-baseline="central">8</text>
<text x="255" y="143" class="label2" text-anchor="middle">Snapshot</text>

<!-- TRACKBALL -->
<circle cx="165" cy="250" r="58" class="trackball"/>
<circle cx="165" cy="250" r="42" class="tb-inner"/>
<text x="165" y="246" class="label" text-anchor="middle" dominant-baseline="central" style="fill:#ddd">mouse</text>
<text x="165" y="260" class="label" text-anchor="middle" style="fill:#ddd">pad</text>

<!-- MOUSE BUTTONS -->
<text x="24" y="328" class="section" text-anchor="end">mouse</text>
<rect x="48" y="316" width="55" height="24" rx="5" class="mouse"/>
<text x="75" y="325" class="code" text-anchor="middle" dominant-baseline="central" style="fill:#333">L</text>
<text x="75" y="336" class="label2" text-anchor="middle">0x89</text>

<rect x="137" y="316" width="55" height="24" rx="5" class="unmapped"/>
<text x="164" y="322" class="code" text-anchor="middle" dominant-baseline="central">46</text>
<text x="164" y="334" class="label2" text-anchor="middle">dbl-click</text>

<rect x="228" y="316" width="55" height="24" rx="5" class="mouse"/>
<text x="255" y="325" class="code" text-anchor="middle" dominant-baseline="central" style="fill:#333">R</text>
<text x="255" y="336" class="label2" text-anchor="middle">0x8A</text>

<!-- TRANSPORT ROW 1 -->
<text x="24" y="375" class="section" text-anchor="end">transport</text>
<text x="75" y="358" class="label2" text-anchor="middle">Repeat↑</text>
<rect x="40" y="362" width="70" height="34" rx="5" class="mapped"/>
<text x="75" y="373" class="code" text-anchor="middle" dominant-baseline="central">9</text>
<text x="75" y="387" class="label2" text-anchor="middle">◄◄ prev</text>

<rect x="130" y="362" width="70" height="34" rx="5" class="mapped"/>
<text x="165" y="373" class="code" text-anchor="middle" dominant-baseline="central">10</text>
<text x="165" y="387" class="label2" text-anchor="middle">►/II play</text>

<rect x="220" y="362" width="70" height="34" rx="5" class="mapped"/>
<text x="255" y="373" class="code" text-anchor="middle" dominant-baseline="central">11</text>
<text x="255" y="387" class="label2" text-anchor="middle">next ►►</text>

<!-- TRANSPORT ROW 2 -->
<rect x="40" y="406" width="70" height="34" rx="5" class="unmapped"/>
<text x="75" y="417" class="code" text-anchor="middle" dominant-baseline="central">12</text>
<text x="75" y="431" class="label2" text-anchor="middle">● rec</text>

<rect x="130" y="406" width="70" height="34" rx="5" class="mapped"/>
<text x="165" y="417" class="code" text-anchor="middle" dominant-baseline="central">13</text>
<text x="165" y="431" class="label2" text-anchor="middle">■ stop</text>

<rect x="220" y="406" width="70" height="34" rx="5" class="unmapped"/>
<text x="255" y="417" class="code" text-anchor="middle" dominant-baseline="central">14</text>
<text x="255" y="431" class="label2" text-anchor="middle">⏏ source</text>

<!-- VOL +/- mute CH +/- -->
<text x="24" y="475" class="section" text-anchor="end">vol</text>
<rect x="40" y="454" width="62" height="26" rx="5" class="mapped"/>
<text x="71" y="463" class="code" text-anchor="middle" dominant-baseline="central">15</text>
<text x="71" y="475" class="label2" text-anchor="middle">VOL+</text>

<rect x="40" y="490" width="62" height="26" rx="5" class="mapped"/>
<text x="71" y="499" class="code" text-anchor="middle" dominant-baseline="central">16</text>
<text x="71" y="511" class="label2" text-anchor="middle">VOL-</text>

<rect x="134" y="462" width="62" height="38" rx="19" class="mapped"/>
<text x="165" y="476" class="code" text-anchor="middle" dominant-baseline="central">17</text>
<text x="165" y="491" class="label2" text-anchor="middle">mute</text>

<text x="316" y="475" class="section" text-anchor="start">ch</text>
<rect x="228" y="454" width="62" height="26" rx="5" class="mapped"/>
<text x="259" y="463" class="code" text-anchor="middle" dominant-baseline="central">18</text>
<text x="259" y="475" class="label2" text-anchor="middle">CH▲ view+</text>

<rect x="228" y="490" width="62" height="26" rx="5" class="mapped"/>
<text x="259" y="499" class="code" text-anchor="middle" dominant-baseline="central">19</text>
<text x="259" y="511" class="label2" text-anchor="middle">CH▼ view-</text>

<!-- FUNCTION ROW -->
<text x="24" y="560" class="section" text-anchor="end">fn</text>
<text x="75" y="542" class="label2" text-anchor="middle">—</text>
<rect x="40" y="548" width="70" height="34" rx="5" class="unmapped"/>
<text x="75" y="559" class="code" text-anchor="middle" dominant-baseline="central">20</text>
<text x="75" y="573" class="label2" text-anchor="middle">⬜ window</text>

<text x="165" y="542" class="label2" text-anchor="middle">Bookmark↑</text>
<rect x="130" y="548" width="70" height="34" rx="5" class="unmapped"/>
<text x="165" y="559" class="code" text-anchor="middle" dominant-baseline="central">21</text>
<text x="165" y="573" class="label2" text-anchor="middle">📅 calendar</text>

<text x="255" y="542" class="label2" text-anchor="middle">Num Lock↑</text>
<rect x="220" y="548" width="70" height="34" rx="5" class="unmapped"/>
<text x="255" y="559" class="code" text-anchor="middle" dominant-baseline="central">22</text>
<text x="255" y="573" class="label2" text-anchor="middle">🔊 audio</text>

<!-- NUMPAD 1-3 -->
<text x="24" y="625" class="section" text-anchor="end">numpad</text>
<rect x="40" y="606" width="70" height="38" rx="5" class="dwm"/>
<text x="75" y="619" class="code" text-anchor="middle" dominant-baseline="central">23</text>
<text x="75" y="635" class="label2" text-anchor="middle">1→tag 1</text>

<rect x="130" y="606" width="70" height="38" rx="5" class="dwm"/>
<text x="165" y="619" class="code" text-anchor="middle" dominant-baseline="central">24</text>
<text x="165" y="635" class="label2" text-anchor="middle">2→tag 2</text>

<rect x="220" y="606" width="70" height="38" rx="5" class="dwm"/>
<text x="255" y="619" class="code" text-anchor="middle" dominant-baseline="central">25</text>
<text x="255" y="635" class="label2" text-anchor="middle">3→tag 3</text>

<!-- NUMPAD 4-6 -->
<rect x="40" y="654" width="70" height="38" rx="5" class="dwm"/>
<text x="75" y="667" class="code" text-anchor="middle" dominant-baseline="central">26</text>
<text x="75" y="683" class="label2" text-anchor="middle">4→tag 4</text>

<rect x="130" y="654" width="70" height="38" rx="5" class="dwm"/>
<text x="165" y="667" class="code" text-anchor="middle" dominant-baseline="central">27</text>
<text x="165" y="683" class="label2" text-anchor="middle">5→tag 5</text>

<rect x="220" y="654" width="70" height="38" rx="5" class="dwm"/>
<text x="255" y="667" class="code" text-anchor="middle" dominant-baseline="central">28</text>
<text x="255" y="683" class="label2" text-anchor="middle">6→tag 6</text>

<!-- NUMPAD 7-9 -->
<rect x="40" y="702" width="70" height="38" rx="5" class="dwm"/>
<text x="75" y="715" class="code" text-anchor="middle" dominant-baseline="central">29</text>
<text x="75" y="731" class="label2" text-anchor="middle">7→tag 7</text>

<rect x="130" y="702" width="70" height="38" rx="5" class="dwm"/>
<text x="165" y="715" class="code" text-anchor="middle" dominant-baseline="central">30</text>
<text x="165" y="731" class="label2" text-anchor="middle">8→tag 8</text>

<rect x="220" y="702" width="70" height="38" rx="5" class="dwm"/>
<text x="255" y="715" class="code" text-anchor="middle" dominant-baseline="central">31</text>
<text x="255" y="731" class="label2" text-anchor="middle">9→tag 9</text>

<!-- BOTTOM ROW -->
<text x="24" y="768" class="section" text-anchor="end">bottom</text>
<rect x="40" y="752" width="70" height="38" rx="5" class="mapped"/>
<text x="75" y="765" class="code" text-anchor="middle" dominant-baseline="central">32</text>
<text x="75" y="781" class="label2" text-anchor="middle">↺ repeat</text>

<rect x="130" y="752" width="70" height="38" rx="5" class="dwm"/>
<text x="165" y="765" class="code" text-anchor="middle" dominant-baseline="central">33</text>
<text x="165" y="781" class="label2" text-anchor="middle">0→all tags</text>

<rect x="220" y="752" width="70" height="38" rx="5" class="unmapped"/>
<text x="255" y="765" class="code" text-anchor="middle" dominant-baseline="central">36</text>
<text x="255" y="781" class="label2" text-anchor="middle">🔍 search</text>

<!-- LEGEND -->
<rect x="40" y="815" width="260" height="118" rx="6" style="fill:none;stroke:#555;stroke-width:0.5"/>
<text x="170" y="832" class="title" text-anchor="middle">Legend</text>
<rect x="52" y="840" width="14" height="10" rx="2" class="mapped"/>
<text x="72" y="849" class="label2" text-anchor="start">mapped — MPD / ncmpcpp</text>
<rect x="52" y="858" width="14" height="10" rx="2" class="dwm"/>
<text x="72" y="867" class="label2" text-anchor="start">mapped — dwm tags</text>
<rect x="52" y="876" width="14" height="10" rx="2" class="unmapped"/>
<text x="72" y="885" class="label2" text-anchor="start">unmapped</text>
<rect x="52" y="894" width="14" height="10" rx="2" class="mouse"/>
<text x="72" y="903" class="label2" text-anchor="start">mouse (hardware)</text>
<text x="52" y="924" class="label2" text-anchor="start">↑ = DVD mode label printed above button</text>

</svg>
