<svg width="340" viewBox="0 0 340 555" role="img" xmlns="http://www.w3.org/2000/svg">
<title>eDio USB Remote — verified button code map</title>
<desc>Schematic of the ASUS eDio remote showing verified button codes. Green = mapped to MPD/ncmpcpp, orange = dwm tags, dashed = unmapped, grey = mouse hardware.</desc>

<style>
  text { font-family: sans-serif; fill: #222; }
  .code { font-size: 9px; font-weight: 700; }
  .lbl  { font-size: 7px; fill: #444; }
  .lbl2 { font-size: 6.5px; fill: #777; }
  .sec  { font-size: 7px; fill: #999; }
  /* colorblind-safe palette */
  /* MPD/ncmpcpp: teal green */
  .mapped   { fill: #ccece6; stroke: #0f6e56; stroke-width: 1; }
  /* dwm tags: orange (safe for deuteranopia/protanopia) */
  .dwm      { fill: #fde8cc; stroke: #b85c00; stroke-width: 1; }
  /* unmapped: no fill, grey dashed */
  .unmapped { fill: none; stroke: #999; stroke-width: 0.8; stroke-dasharray: 3 2; }
  /* mouse: dark grey */
  .mouse    { fill: #ddd; stroke: #444; stroke-width: 1; }
  .body     { fill: #222; stroke: #111; stroke-width: 1.5; }
  .trackball{ fill: #555; stroke: #333; stroke-width: 1.5; }
  .tb-inner { fill: #777; }
  /* legend swatches */
  .sw-mapped  { fill: #ccece6; stroke: #0f6e56; stroke-width: 1; }
  .sw-dwm     { fill: #fde8cc; stroke: #b85c00; stroke-width: 1; }
  .sw-none    { fill: none;    stroke: #999;    stroke-width: 0.8; stroke-dasharray: 3 2; }
  .sw-mouse   { fill: #ddd;    stroke: #444;    stroke-width: 1; }
</style>

<!-- Remote body -->
<rect x="30" y="5" width="280" height="520" rx="55" class="body"/>

<!-- ROW 1 mode selectors -->
<text x="26" y="34" class="sec" text-anchor="end">row 1</text>
<circle cx="78"  cy="33" r="15" class="unmapped"/>
<text x="78"  y="30" class="code" text-anchor="middle" dominant-baseline="central">1</text>
<text x="78"  y="53" class="lbl2" text-anchor="middle">VCR</text>
<circle cx="126" cy="33" r="15" class="unmapped"/>
<text x="126" y="30" class="code" text-anchor="middle" dominant-baseline="central">2</text>
<text x="126" y="53" class="lbl2" text-anchor="middle">DVD</text>
<circle cx="200" cy="33" r="15" class="unmapped"/>
<text x="200" y="30" class="code" text-anchor="middle" dominant-baseline="central">35</text>
<text x="200" y="53" class="lbl2" text-anchor="middle">Teletext</text>
<circle cx="252" cy="33" r="15" class="unmapped"/>
<text x="252" y="30" class="code" text-anchor="middle" dominant-baseline="central">4</text>
<text x="252" y="53" class="lbl2" text-anchor="middle">FM</text>

<!-- ROW 2 context buttons (dual labels) -->
<text x="26" y="75" class="sec" text-anchor="end">row 2</text>
<text x="78"  y="63" class="lbl2" text-anchor="middle">Menu</text>
<circle cx="78"  cy="75" r="11" class="unmapped"/>
<text x="78"  y="72" class="code" text-anchor="middle" dominant-baseline="central">5</text>
<text x="78"  y="91" class="lbl2" text-anchor="middle">Inst.Rply</text>
<text x="126" y="63" class="lbl2" text-anchor="middle">Subtitles</text>
<circle cx="126" cy="75" r="11" class="unmapped"/>
<text x="126" y="72" class="code" text-anchor="middle" dominant-baseline="central">6</text>
<text x="126" y="91" class="lbl2" text-anchor="middle">Playback</text>
<text x="200" y="63" class="lbl2" text-anchor="middle">Audio</text>
<circle cx="200" cy="75" r="11" class="unmapped"/>
<text x="200" y="72" class="code" text-anchor="middle" dominant-baseline="central">7</text>
<text x="200" y="91" class="lbl2" text-anchor="middle">EPG</text>
<text x="252" y="63" class="lbl2" text-anchor="middle">Snapshot</text>
<circle cx="252" cy="75" r="11" class="unmapped"/>
<text x="252" y="72" class="code" text-anchor="middle" dominant-baseline="central">8</text>
<text x="252" y="91" class="lbl2" text-anchor="middle">Snapshot</text>

<!-- TRACKBALL -->
<circle cx="165" cy="150" r="42" class="trackball"/>
<circle cx="165" cy="150" r="30" class="tb-inner"/>
<text x="165" y="147" class="lbl2" text-anchor="middle" style="fill:#ccc">mouse pad</text>

<!-- MOUSE BUTTONS -->
<text x="26" y="200" class="sec" text-anchor="end">mouse</text>
<rect x="48"  y="192" width="50" height="20" rx="4" class="mouse"/>
<text x="73"  y="201" class="code" text-anchor="middle" dominant-baseline="central" style="fill:#333">L 0x89</text>
<rect x="140" y="192" width="50" height="20" rx="4" class="mapped"/>
<text x="165" y="199" class="code" text-anchor="middle" dominant-baseline="central">46</text>
<text x="165" y="208" class="lbl2" text-anchor="middle">mid-click</text>
<rect x="242" y="192" width="50" height="20" rx="4" class="mouse"/>
<text x="267" y="201" class="code" text-anchor="middle" dominant-baseline="central" style="fill:#333">R 0x8A</text>

<!-- TRANSPORT ROW 1 -->
<text x="26" y="228" class="sec" text-anchor="end">transport</text>
<text x="73"  y="218" class="lbl2" text-anchor="middle">Repeat↑</text>
<rect x="38"  y="222" width="68" height="28" rx="4" class="mapped"/>
<text x="72"  y="231" class="code" text-anchor="middle" dominant-baseline="central">9</text>
<text x="72"  y="242" class="lbl2" text-anchor="middle">◄◄ prev</text>
<rect x="131" y="222" width="68" height="28" rx="4" class="mapped"/>
<text x="165" y="231" class="code" text-anchor="middle" dominant-baseline="central">10</text>
<text x="165" y="242" class="lbl2" text-anchor="middle">►/II play</text>
<rect x="234" y="222" width="68" height="28" rx="4" class="mapped"/>
<text x="268" y="231" class="code" text-anchor="middle" dominant-baseline="central">11</text>
<text x="268" y="242" class="lbl2" text-anchor="middle">next ►►</text>

<!-- TRANSPORT ROW 2 -->
<rect x="38"  y="256" width="68" height="28" rx="4" class="unmapped"/>
<text x="72"  y="265" class="code" text-anchor="middle" dominant-baseline="central">12</text>
<text x="72"  y="276" class="lbl2" text-anchor="middle">● rec</text>
<rect x="131" y="256" width="68" height="28" rx="4" class="mapped"/>
<text x="165" y="265" class="code" text-anchor="middle" dominant-baseline="central">13</text>
<text x="165" y="276" class="lbl2" text-anchor="middle">■ stop</text>
<rect x="234" y="256" width="68" height="28" rx="4" class="unmapped"/>
<text x="268" y="265" class="code" text-anchor="middle" dominant-baseline="central">14</text>
<text x="268" y="276" class="lbl2" text-anchor="middle">⏏ source</text>

<!-- VOL / MUTE / CH -->
<text x="26" y="305" class="sec" text-anchor="end">vol</text>
<rect x="38"  y="292" width="58" height="22" rx="4" class="mapped"/>
<text x="67"  y="301" class="code" text-anchor="middle" dominant-baseline="central">15</text>
<text x="67"  y="311" class="lbl2" text-anchor="middle">VOL+</text>
<rect x="38"  y="320" width="58" height="22" rx="4" class="mapped"/>
<text x="67"  y="329" class="code" text-anchor="middle" dominant-baseline="central">16</text>
<text x="67"  y="339" class="lbl2" text-anchor="middle">VOL-</text>
<rect x="136" y="298" width="58" height="32" rx="16" class="mapped"/>
<text x="165" y="310" class="code" text-anchor="middle" dominant-baseline="central">17</text>
<text x="165" y="322" class="lbl2" text-anchor="middle">mute</text>
<text x="314" y="305" class="sec" text-anchor="start">ch</text>
<rect x="244" y="292" width="58" height="22" rx="4" class="mapped"/>
<text x="273" y="301" class="code" text-anchor="middle" dominant-baseline="central">18</text>
<text x="273" y="311" class="lbl2" text-anchor="middle">CH▲ view+</text>
<rect x="244" y="320" width="58" height="22" rx="4" class="mapped"/>
<text x="273" y="329" class="code" text-anchor="middle" dominant-baseline="central">19</text>
<text x="273" y="339" class="lbl2" text-anchor="middle">CH▼ view-</text>

<!-- FUNCTION ROW -->
<text x="26" y="362" class="sec" text-anchor="end">fn</text>
<text x="72"  y="352" class="lbl2" text-anchor="middle">—</text>
<rect x="38"  y="356" width="68" height="26" rx="4" class="unmapped"/>
<text x="72"  y="364" class="code" text-anchor="middle" dominant-baseline="central">20</text>
<text x="72"  y="375" class="lbl2" text-anchor="middle">⬜ window</text>
<text x="165" y="352" class="lbl2" text-anchor="middle">Bookmark↑</text>
<rect x="131" y="356" width="68" height="26" rx="4" class="unmapped"/>
<text x="165" y="364" class="code" text-anchor="middle" dominant-baseline="central">21</text>
<text x="165" y="375" class="lbl2" text-anchor="middle">📅 calendar</text>
<text x="268" y="352" class="lbl2" text-anchor="middle">Num Lock↑</text>
<rect x="234" y="356" width="68" height="26" rx="4" class="unmapped"/>
<text x="268" y="364" class="code" text-anchor="middle" dominant-baseline="central">22</text>
<text x="268" y="375" class="lbl2" text-anchor="middle">🔊 audio</text>

<!-- NUMPAD 1-9 (3 rows) -->
<text x="26" y="398" class="sec" text-anchor="end">numpad</text>
<!-- row 1-3 -->
<rect x="38"  y="386" width="68" height="24" rx="4" class="dwm"/>
<text x="72"  y="395" class="code" text-anchor="middle" dominant-baseline="central">23</text>
<text x="72"  y="406" class="lbl2" text-anchor="middle">1→tag 1</text>
<rect x="131" y="386" width="68" height="24" rx="4" class="dwm"/>
<text x="165" y="395" class="code" text-anchor="middle" dominant-baseline="central">24</text>
<text x="165" y="406" class="lbl2" text-anchor="middle">2→tag 2</text>
<rect x="234" y="386" width="68" height="24" rx="4" class="dwm"/>
<text x="268" y="395" class="code" text-anchor="middle" dominant-baseline="central">25</text>
<text x="268" y="406" class="lbl2" text-anchor="middle">3→tag 3</text>
<!-- row 4-6 -->
<rect x="38"  y="414" width="68" height="24" rx="4" class="dwm"/>
<text x="72"  y="423" class="code" text-anchor="middle" dominant-baseline="central">26</text>
<text x="72"  y="434" class="lbl2" text-anchor="middle">4→tag 4</text>
<rect x="131" y="414" width="68" height="24" rx="4" class="dwm"/>
<text x="165" y="423" class="code" text-anchor="middle" dominant-baseline="central">27</text>
<text x="165" y="434" class="lbl2" text-anchor="middle">5→tag 5</text>
<rect x="234" y="414" width="68" height="24" rx="4" class="dwm"/>
<text x="268" y="423" class="code" text-anchor="middle" dominant-baseline="central">28</text>
<text x="268" y="434" class="lbl2" text-anchor="middle">6→tag 6</text>
<!-- row 7-9 -->
<rect x="38"  y="442" width="68" height="24" rx="4" class="dwm"/>
<text x="72"  y="451" class="code" text-anchor="middle" dominant-baseline="central">29</text>
<text x="72"  y="462" class="lbl2" text-anchor="middle">7→tag 7</text>
<rect x="131" y="442" width="68" height="24" rx="4" class="dwm"/>
<text x="165" y="451" class="code" text-anchor="middle" dominant-baseline="central">30</text>
<text x="165" y="462" class="lbl2" text-anchor="middle">8→tag 8</text>
<rect x="234" y="442" width="68" height="24" rx="4" class="dwm"/>
<text x="268" y="451" class="code" text-anchor="middle" dominant-baseline="central">31</text>
<text x="268" y="462" class="lbl2" text-anchor="middle">9→tag 9</text>

<!-- BOTTOM ROW -->
<text x="26" y="478" class="sec" text-anchor="end">bottom</text>
<rect x="38"  y="468" width="68" height="24" rx="4" class="mapped"/>
<text x="72"  y="477" class="code" text-anchor="middle" dominant-baseline="central">32</text>
<text x="72"  y="488" class="lbl2" text-anchor="middle">↺ repeat</text>
<rect x="131" y="468" width="68" height="24" rx="4" class="dwm"/>
<text x="165" y="477" class="code" text-anchor="middle" dominant-baseline="central">33</text>
<text x="165" y="488" class="lbl2" text-anchor="middle">0→all tags</text>
<rect x="234" y="468" width="68" height="24" rx="4" class="unmapped"/>
<text x="268" y="477" class="code" text-anchor="middle" dominant-baseline="central">36</text>
<text x="268" y="488" class="lbl2" text-anchor="middle">🔍 search</text>

<!-- LEGEND (outside remote body, below) -->
<rect x="38" y="525" width="264" height="0" rx="4" style="fill:none"/>
<!-- inline horizontal legend -->
<rect x="38"  y="525" width="10" height="8" rx="1" class="sw-mapped"/>
<text x="52"  y="532" class="lbl2" text-anchor="start">MPD</text>
<rect x="88"  y="525" width="10" height="8" rx="1" class="sw-dwm"/>
<text x="102" y="532" class="lbl2" text-anchor="start">dwm tags</text>
<rect x="158" y="525" width="10" height="8" rx="1" class="sw-none"/>
<text x="172" y="532" class="lbl2" text-anchor="start">unmapped</text>
<rect x="228" y="525" width="10" height="8" rx="1" class="sw-mouse"/>
<text x="242" y="532" class="lbl2" text-anchor="start">mouse hw</text>

</svg>
